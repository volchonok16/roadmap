# Временный конфиг ТОЛЬКО для первого запуска certbot (пока нет SSL).
# После certbot замените на pallink.conf.
#
#   sudo cp deploy/nginx/pallink.certbot-bootstrap.conf /etc/nginx/sites-available/pallink.conf
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot certonly --webroot -w /var/www/certbot \
#     -d pallink.fun -d www.pallink.fun -d api.pallink.fun
#   sudo cp deploy/nginx/pallink.conf /etc/nginx/sites-available/pallink.conf
#   sudo nginx -t && sudo systemctl reload nginx

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name pallink.fun www.pallink.fun;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        include snippets/proxy-common.conf;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://127.0.0.1:5173;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.pallink.fun;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        include snippets/proxy-common.conf;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_pass http://127.0.0.1:8000;
    }
}
