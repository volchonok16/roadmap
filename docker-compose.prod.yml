# Production: сервисы только на localhost, снаружи — nginx + certbot.
#
#   cp .env.production.example .env
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d

services:
  # БД только внутри сети Docker (backend → postgres:5432). Порт 5432 на хосте не нужен.
  postgres:
    ports: !reset []

  backend:
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-https://pallink.fun}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-https://api.pallink.fun}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-https://pallink.fun,https://www.pallink.fun}

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.pallink.fun}
    ports:
      - "127.0.0.1:5173:5173"
