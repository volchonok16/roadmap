# Production: сервисы только на localhost, снаружи — nginx + certbot.
#
#   cp .env.production.example .env
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d

services:
  backend:
    command: sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${BACKEND_WORKERS:-2}"
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-https://pallink.fun}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-https://api.pallink.fun}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-https://pallink.fun,https://www.pallink.fun}
      TFS_BATCH_SIZE: ${TFS_BATCH_SIZE:-50}
      TFS_REQUEST_DELAY_SECONDS: ${TFS_REQUEST_DELAY_SECONDS:-0.4}
      TFS_COMPACT_CONCURRENCY: ${TFS_COMPACT_CONCURRENCY:-2}
      TFS_WIQL_MAX_RESULTS: ${TFS_WIQL_MAX_RESULTS:-15000}
      METRICS_REFRESH_AFTER_SYNC: ${METRICS_REFRESH_AFTER_SYNC:-false}
      SYNC_STALE_RUNNING_MINUTES: ${SYNC_STALE_RUNNING_MINUTES:-180}

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.pallink.fun}
    ports:
      - "127.0.0.1:5173:5173"
