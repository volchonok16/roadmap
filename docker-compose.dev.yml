# Локальная отладка: порты на localhost (не использовать на VPS с prod).
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  postgres:
    ports:
      - "5432:5432"
  backend:
    ports:
      - "8000:8000"
  frontend:
    ports:
      - "5173:5173"
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - /app/node_modules
