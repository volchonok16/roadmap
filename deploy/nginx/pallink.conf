# TFS Roadmap — только pallink.fun, www, api.
# minio.pallink.fun и turn.pallink.fun — отдельные конфиги nginx (не трогаем здесь).
#
# Установка на Ubuntu/Debian:
#   sudo mkdir -p /var/www/certbot
#   sudo cp -r deploy/nginx/snippets /etc/nginx/snippets/
#   sudo cp deploy/nginx/pallink.conf /etc/nginx/sites-available/pallink.conf
#   sudo ln -sf /etc/nginx/sites-available/pallink.conf /etc/nginx/sites-enabled/pallink.conf
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Сертификат (один на все имена):
#   sudo certbot certonly --webroot -w /var/www/certbot \
#     -d pallink.fun -d www.pallink.fun -d api.pallink.fun
#
# После выпуска сертификата подключите этот файл (с HTTPS-блоками).
# Автопродление: sudo certbot renew --dry-run

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# --- HTTP → HTTPS + ACME ---
server {
    listen 80;
    listen [::]:80;
    server_name pallink.fun www.pallink.fun api.pallink.fun;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# www → apex
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.pallink.fun;

    include snippets/ssl-pallink.conf;

    return 301 https://pallink.fun$request_uri;
}

# --- Frontend: pallink.fun ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pallink.fun;

    include snippets/ssl-pallink.conf;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        include snippets/proxy-common.conf;
        # Vite dev отклоняет Host pallink.fun (403) — для прокси передаём localhost
        proxy_set_header Host localhost;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_pass http://127.0.0.1:5173;
    }
}

# --- API: api.pallink.fun ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.pallink.fun;

    include snippets/ssl-pallink.conf;

    client_max_body_size 16m;

    location / {
        include snippets/proxy-common.conf;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_pass http://127.0.0.1:8000;
    }
}
