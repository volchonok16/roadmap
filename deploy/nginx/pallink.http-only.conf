# Шаг 1: только HTTP — для первого выпуска сертификата certbot.
# Скопируйте на сервер:
#   sudo cp deploy/nginx/pallink.http-only.conf /etc/nginx/sites-available/pallink.conf
#   sudo ln -sf /etc/nginx/sites-available/pallink.conf /etc/nginx/sites-enabled/pallink.conf
#   sudo nginx -t && sudo systemctl reload nginx
# Затем см. deploy/DEPLOY.md (certbot).

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name pallink.fun www.pallink.fun api.pallink.fun;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

